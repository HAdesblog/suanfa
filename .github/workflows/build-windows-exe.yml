name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        shell: bash
        run: python -m pytest -q

      - name: Build onedir EXE
        shell: bash
        run: pyinstaller --noconfirm --windowed --name MimaGuard run.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: MimaGuard-windows10plus-exe
          path: dist/MimaGuard/MimaGuard.exe
          if-no-files-found: error
